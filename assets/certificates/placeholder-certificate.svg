<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="850" viewBox="0 0 1200 850" role="img" aria-labelledby="title desc">
  <title id="title">Certificate Placeholder</title>
  <desc id="desc">Placeholder image shown when a certificate image is missing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#e2e8f0" />
    </linearGradient>
  </defs>
  <rect width="1200" height="850" fill="url(#bg)" />
  <rect x="24" y="24" width="1152" height="802" rx="16" fill="none" stroke="#cbd5e1" stroke-width="4" />
  <text x="600" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="64" fill="#0f172a" font-weight="700">Unable to Load</text>
  <text x="600" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" fill="#334155">Certificate image not available</text>
</svg>
