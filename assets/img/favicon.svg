<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18d26e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#35e888;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background with rounded corners -->
  <rect width="180" height="180" rx="30" fill="#040404"/>
  
  <!-- Lightbulb outline -->
  <g stroke="url(#grad1)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bulb glass -->
    <path d="M 90 50 
             Q 115 50 125 68 
             Q 135 86 125 104
             Q 120 112 115 117
             L 115 127
             Q 115 131 111 131
             L 69 131
             Q 65 131 65 127
             L 65 117
             Q 60 112 55 104
             Q 45 86 55 68
             Q 65 50 90 50 Z"/>
    
    <!-- Base threads -->
    <line x1="68" y1="136" x2="112" y2="136" />
    <line x1="68" y1="142" x2="112" y2="142" />
    
    <!-- Base cap -->
    <rect x="65" y="147" width="50" height="8" rx="2" stroke="url(#grad1)" fill="url(#grad1)" opacity="0.8"/>
  </g>
  
  <!-- Code brackets inside bulb -->
  <g stroke="url(#grad1)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 78 78 L 68 90 L 78 102" />
    <path d="M 102 78 L 112 90 L 102 102" />
    <!-- Forward slash -->
    <line x1="98" y1="78" x2="82" y2="102" />
  </g>
  
  <!-- Light rays -->
  <g stroke="url(#grad1)" stroke-width="3" stroke-linecap="round">
    <line x1="90" y1="28" x2="90" y2="42" />
    <line x1="138" y1="48" x2="128" y2="58" />
    <line x1="152" y1="90" x2="138" y2="90" />
    <line x1="52" y1="48" x2="62" y2="58" />
    <line x1="28" y1="90" x2="42" y2="90" />
  </g>
</svg>
