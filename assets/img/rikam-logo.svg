<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18d26e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#35e888;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="200" fill="#040404" rx="20"/>
  
  <!-- Icon Section - Lightbulb with Code -->
  <g transform="translate(30, 0)">
    <!-- Lightbulb outline -->
    <g stroke="url(#logoGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <!-- Bulb glass -->
      <path d="M 100 55 
               Q 120 55 128 70 
               Q 136 85 128 100
               Q 124 107 120 111
               L 120 120
               Q 120 123 117 123
               L 83 123
               Q 80 123 80 120
               L 80 111
               Q 76 107 72 100
               Q 64 85 72 70
               Q 80 55 100 55 Z"/>
      
      <!-- Base threads -->
      <line x1="82" y1="127" x2="118" y2="127" />
      <line x1="82" y1="132" x2="118" y2="132" />
      
      <!-- Base cap -->
      <rect x="78" y="137" width="44" height="7" rx="2" stroke="url(#logoGrad)" fill="url(#logoGrad)" opacity="0.8"/>
    </g>
    
    <!-- Code brackets inside bulb -->
    <g stroke="url(#logoGrad)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 90 80 L 82 92 L 90 104" />
      <path d="M 110 80 L 118 92 L 110 104" />
      <!-- Forward slash -->
      <line x1="106" y1="80" x2="94" y2="104" />
    </g>
    
    <!-- Light rays -->
    <g stroke="url(#logoGrad)" stroke-width="2.5" stroke-linecap="round">
      <line x1="100" y1="35" x2="100" y2="48" />
      <line x1="142" y1="52" x2="133" y2="61" />
      <line x1="154" y1="92" x2="141" y2="92" />
      <line x1="58" y1="52" x2="67" y2="61" />
      <line x1="46" y1="92" x2="59" y2="92" />
    </g>
  </g>
  
  <!-- Text Section -->
  <g>
    <!-- RIKAM -->
    <text x="220" y="95" 
          font-family="'Poppins', 'Raleway', sans-serif" 
          font-size="52" 
          font-weight="700" 
          fill="url(#logoGrad)">RIKAM</text>
    
    <!-- PALKAR -->
    <text x="220" y="140" 
          font-family="'Poppins', 'Raleway', sans-serif" 
          font-size="52" 
          font-weight="700" 
          fill="#ffffff">PALKAR</text>
    
    <!-- Tagline -->
    <text x="220" y="165" 
          font-family="'Open Sans', sans-serif" 
          font-size="14" 
          font-weight="400" 
          fill="#18d26e" 
          opacity="0.9">Software Engineer • Architect • Author</text>
  </g>
</svg>
