<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="tttGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18d26e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#35e888;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#040404"/>
  
  <!-- Tic-Tac-Toe Grid -->
  <g stroke="url(#tttGrad)" stroke-width="6" stroke-linecap="round">
    <!-- Vertical lines -->
    <line x1="73" y1="45" x2="73" y2="155" />
    <line x1="127" y1="45" x2="127" y2="155" />
    
    <!-- Horizontal lines -->
    <line x1="45" y1="73" x2="155" y2="73" />
    <line x1="45" y1="127" x2="155" y2="127" />
  </g>
  
  <!-- Game pieces - X and O -->
  <g>
    <!-- O in top-left -->
    <circle cx="59" cy="59" r="12" stroke="url(#tttGrad)" stroke-width="5" fill="none"/>
    
    <!-- X in center -->
    <g stroke="url(#tttGrad)" stroke-width="5" stroke-linecap="round">
      <line x1="90" y1="90" x2="110" y2="110" />
      <line x1="110" y1="90" x2="90" y2="110" />
    </g>
    
    <!-- O in bottom-right -->
    <circle cx="141" cy="141" r="12" stroke="url(#tttGrad)" stroke-width="5" fill="none"/>
  </g>
</svg>
