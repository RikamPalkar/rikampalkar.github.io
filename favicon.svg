<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18d26e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#35e888;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#040404"/>
  
  <!-- Lightbulb outline -->
  <g stroke="url(#grad)" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bulb glass -->
    <path d="M 256 140 
             Q 310 140 330 180 
             Q 350 220 330 260
             Q 320 280 310 290
             L 310 320
             Q 310 330 300 330
             L 212 330
             Q 202 330 202 320
             L 202 290
             Q 192 280 182 260
             Q 162 220 182 180
             Q 202 140 256 140 Z"/>
    
    <!-- Base threads -->
    <line x1="210" y1="340" x2="302" y2="340" />
    <line x1="210" y1="355" x2="302" y2="355" />
    
    <!-- Base cap -->
    <rect x="200" y="365" width="112" height="20" rx="4" stroke="url(#grad)" fill="url(#grad)" opacity="0.8"/>
  </g>
  
  <!-- Code brackets inside bulb -->
  <g stroke="url(#grad)" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 225 200 L 200 230 L 225 260" />
    <path d="M 287 200 L 312 230 L 287 260" />
    <!-- Forward slash -->
    <line x1="270" y1="200" x2="242" y2="260" />
  </g>
  
  <!-- Light rays -->
  <g stroke="url(#grad)" stroke-width="8" stroke-linecap="round">
    <line x1="256" y1="80" x2="256" y2="110" />
    <line x1="360" y1="120" x2="340" y2="140" />
    <line x1="400" y1="230" x2="370" y2="230" />
    <line x1="152" y1="120" x2="172" y2="140" />
    <line x1="112" y1="230" x2="142" y2="230" />
  </g>
</svg>
